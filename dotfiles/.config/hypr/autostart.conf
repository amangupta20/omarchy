# Extra autostart processes
# exec-once = uwsm app -- my-service
exec-once = quickshell
exec-once = ollama serve
exec-once = gnome-keyring-daemon --start --components=pkcs11,secrets,ssh

# Wallpaper configuration — aggressively kill swaybg from default autostart so awww takes over
exec-once = awww-daemon --format xrgb
exec-once = bash -c '( for i in {1..20}; do pkill -x swaybg 2>/dev/null; sleep 0.2; done ) & sleep 2; f=$(cat $HOME/.cache/awww_last_wallpaper 2>/dev/null); [[ -n "$f" && -f "$f" ]] && awww img "$f" --transition-type any'
$livewallpaper=""
# exec-once = mpvpaper "*" -o "load-scripts=no no-audio --loop" "$livewallpaper"

